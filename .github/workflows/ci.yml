name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: Type-check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build (tsc -b && vite build)
        run: npm run build
